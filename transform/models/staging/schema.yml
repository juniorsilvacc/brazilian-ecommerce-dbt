version: 2

models:
  - name: stg_customers
    description: "Tabela de clientes limpa e com a coluna de região brasileira adicionada."
    columns:
      - name: customer_id
        description: "ID único do pedido do cliente (Chave Primária)."
        tests:
          - unique
          - not_null
      - name: state
        description: "UF do cliente (ex: SP, RJ)."

  - name: stg_orders
    description: "Tabela principal de pedidos com datas convertidas para timestamp."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved', 'unavailable', 'created']

  - name: stg_order_items
    description: "Detalhes dos produtos vendidos em cada pedido."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: price
        description: "Preço unitário do item."

  - name: stg_order_payments
    description: "Informações de pagamento dos pedidos."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_value
        tests:
          - not_null

  - name: stg_products
    description: "Catálogo de produtos com dimensões físicas."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null